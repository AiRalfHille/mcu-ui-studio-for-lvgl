site_name: MCU UI Studio for LVGL - GitHub Guide
site_description: Projekt- und Referenzdokumentation fuer MCU UI Studio for LVGL
site_url: https://example.invalid/mcu-ui-studio-for-lvgl
repo_name: Ai.McuUiStudio
docs_dir: docs
theme:
  name: material
  language: de
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: teal
      accent: orange
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
nav:
  - Start: index.md
  - Projekt:
      - Projektueberblick: project-description.md
      - Architektur und Datenfluss: architecture-summary.md
      - Embedded-Workflow: embedded-workflow.md
      - Roadmap: roadmap.md
  - Referenz:
      - Projektdateiformat: project-file-format.md
      - Display-Modell: display-model.md
      - Preview-Protokoll: preview-protocol.md
      - Widget-Support: widget-support.md
      - Doku-Uebersicht: docs-overview.md

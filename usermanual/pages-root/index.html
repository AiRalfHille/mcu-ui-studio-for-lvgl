<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MCU UI Studio for LVGL Manual</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f4f6f8;
        --panel: #ffffff;
        --text: #17212b;
        --muted: #5a6a79;
        --primary: #0a6fb9;
        --primary-dark: #084f84;
        --border: #d7dfe6;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #11171d;
          --panel: #1b242d;
          --text: #eef4f8;
          --muted: #b7c3cf;
          --primary: #5db0ea;
          --primary-dark: #93cbf3;
          --border: #31404d;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Noto Sans", sans-serif;
        background: radial-gradient(circle at top, rgba(10, 111, 185, 0.10), transparent 45%), var(--bg);
        color: var(--text);
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }

      .card {
        width: min(760px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 2.5rem;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.10);
      }

      h1 {
        margin: 0 0 0.8rem 0;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1rem;
        margin-top: 2rem;
      }

      .action {
        display: block;
        padding: 1.2rem 1.3rem;
        border-radius: 14px;
        text-decoration: none;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(10, 111, 185, 0.08), rgba(10, 111, 185, 0.02));
        color: inherit;
        transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
      }

      .action:hover {
        transform: translateY(-2px);
        border-color: var(--primary);
        box-shadow: 0 10px 24px rgba(10, 111, 185, 0.14);
      }

      .action strong {
        display: block;
        margin-bottom: 0.35rem;
        color: var(--primary-dark);
        font-size: 1.05rem;
      }

      .action span {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>MCU UI Studio for LVGL Manual</h1>
        <p>Select the handbook language. The published documentation is available in separate sections so the editor and GitHub Pages can use the same structure.</p>
        <div class="actions">
          <a class="action" href="./de/">
            <strong>Deutsch</strong>
            <span>Deutsches Handbuch oeffnen</span>
          </a>
          <a class="action" href="./en/">
            <strong>English</strong>
            <span>Open the English manual</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>

name: Docs Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/docs-pages.yml"
      - "usermanual/docs/**"
      - "usermanual/docs-en/**"
      - "usermanual/mkdocs.de.yml"
      - "usermanual/mkdocs.en.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs toolchain
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material pymdown-extensions

      - name: Build German manual
        run: mkdocs build -f usermanual/mkdocs.de.yml

      - name: Build English manual
        run: mkdocs build -f usermanual/mkdocs.en.yml

      - name: Assemble Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R usermanual/site/de _site/de
          cp -R usermanual/site/en _site/en
          cp usermanual/pages-root/index.html _site/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
